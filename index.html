<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>九江桥工段 · 无人机报备</title>
    <style>
        /* 基础重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", Arial, sans-serif;
            background: #eef2f7;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 主容器 */
        .box {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            background: #ffffff;
            padding: 16px 12px 20px;
            min-height: 100vh;
        }

        /* 标题 */
        h1 {
            font-size: 18px;
            color: #c0392b;
            text-align: center;
            margin: 0 0 8px 0;
            padding: 0 4px;
            line-height: 1.4;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 4px;
        }

        .sub {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        /* 表单行 */
        .row {
            margin-bottom: 12px;
        }

        .row label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            line-height: 1.4;
        }

        .row label .r {
            color: #c0392b;
            margin-left: 1px;
        }

        .row input,
        .row select {
            width: 100%;
            padding: 10px 10px;
            font-size: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fafcff;
            box-sizing: border-box;
            -webkit-appearance: none;
            appearance: none;
            outline: none;
            transition: border-color 0.2s;
            color: #333;
        }

        .row input:focus,
        .row select:focus {
            border-color: #4facfe;
        }

        .row input::placeholder {
            color: #bbb;
            font-size: 14px;
        }

        .row select {
            height: 42px;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23999' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 18px;
            padding-right: 30px;
        }

        /* 双列布局 */
        .f2 {
            display: flex;
            gap: 8px;
        }

        .f2 .row {
            flex: 1;
            margin-bottom: 0;
            min-width: 0;
        }

        /* 三列布局 */
        .f3 {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .f3 input {
            flex: 1;
            min-width: 0;
        }

        .f3 span {
            font-size: 13px;
            color: #999;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* 定位按钮 */
        .btn-gps {
            height: 42px;
            padding: 0 14px;
            background: #e8f0fe;
            color: #1a73e8;
            border: 1px solid #d2e3fc;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }

        .btn-gps .icon {
            font-size: 16px;
            line-height: 1;
        }

        .btn-gps:active {
            background: #d2e3fc;
            transform: scale(0.96);
        }

        .btn-gps:disabled {
            opacity: 0.6;
            transform: none;
        }

        /* 用途选择 */
        .radios {
            background: #f7faff;
            padding: 10px 8px;
            border-radius: 8px;
            border: 1px solid #e8eff6;
            font-size: 13px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .radios label {
            margin: 0;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            font-weight: normal;
            background: white;
            padding: 6px 10px;
            border-radius: 16px;
            border: 1px solid #ddd;
            font-size: 13px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            transition: all 0.2s;
        }

        .radios label.active {
            background: #e3f2fd;
            border-color: #4facfe;
            color: #1976d2;
        }

        .radios input[type="radio"] {
            width: 16px;
            height: 16px;
            margin-right: 4px;
            accent-color: #4facfe;
            flex-shrink: 0;
        }

        /* 其他用途输入框 */
        .other-box {
            display: none;
            margin-top: 8px;
        }

        .other-box.show {
            display: block;
        }

        .other-box input {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fafcff;
            box-sizing: border-box;
        }

        /* 文件上传 */
        .upbox {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 14px;
            text-align: center;
            background: #f8fbfe;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .upbox:active {
            background: #eef4fb;
        }

        .upbox input[type="file"] {
            display: none;
        }

        .upbox span {
            background: #e6eef7;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 14px;
            color: #333;
            display: inline-block;
        }

        .file-info {
            font-size: 12px;
            color: #9aabb8;
            margin-top: 6px;
            word-break: break-all;
            min-height: 18px;
        }

        /* 警告框 */
        .warn {
            background: #fef6f5;
            border-left: 3px solid #c0392b;
            padding: 8px 10px;
            margin: 12px 0;
            font-size: 12px;
            color: #666;
            border-radius: 4px;
            line-height: 1.6;
        }

        .warn b {
            color: #c0392b;
        }

        /* 提交按钮 */
        .btn-sub {
            display: block;
            width: 100%;
            padding: 12px;
            background: #c0392b;
            color: #fff;
            border: none;
            border-radius: 22px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            -webkit-appearance: none;
            appearance: none;
            outline: none;
        }

        .btn-sub:active {
            background: #a93226;
        }

        .btn-sub:disabled {
            background: #ccc;
            color: #888;
        }

        /* 提示信息 */
        .tip {
            display: none;
            margin-top: 6px;
            padding: 8px 10px;
            background: #f0f8ff;
            border-radius: 6px;
            border-left: 3px solid #4facfe;
            font-size: 12px;
            color: #1a5276;
            line-height: 1.5;
            word-break: break-all;
        }

        .tip.show {
            display: block;
        }

        /* 成功提示 */
        .ok-box {
            display: none;
            text-align: center;
            padding: 20px 14px;
            background: #f0faf5;
            border: 2px solid #2d7a4f;
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .ok-box.show {
            display: block;
        }

        .ok-box .big {
            font-size: 40px;
            margin-bottom: 6px;
        }

        .ok-box h2 {
            font-size: 18px;
            color: #2d7a4f;
            margin: 6px 0;
        }

        .ok-box p {
            font-size: 13px;
            color: #666;
            margin: 4px 0;
            line-height: 1.5;
        }

        .ok-box .note {
            background: #fff8e1;
            border-left: 3px solid #f39c12;
            padding: 10px;
            margin-top: 10px;
            text-align: left;
            font-size: 12px;
            color: #666;
            line-height: 1.7;
            border-radius: 4px;
        }

        .ok-box button {
            margin-top: 10px;
            padding: 8px 20px;
            background: #c0392b;
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        /* 全局消息 */
        .msg {
            display: none;
            background: #1d3b2f;
            color: #fff;
            padding: 10px 14px;
            border-radius: 20px;
            text-align: center;
            margin-top: 10px;
            font-size: 13px;
            line-height: 1.5;
        }

        .msg.show {
            display: block;
        }

        .msg.err {
            background: #8b2c2c;
        }

        /* 底部 */
        .foot {
            text-align: center;
            font-size: 13px;
            color: #c0392b;
            margin-top: 14px;
            padding-top: 10px;
            border-top: 1px solid #eee;
            font-weight: bold;
        }

        /* 加载状态 */
        .loading-mask {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 12px;
        }
        .loading-mask.show {
            display: flex;
        }
        .loading-mask .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #c0392b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-mask p {
            color: #555;
            font-size: 14px;
        }

        /* 小屏手机适配 */
        @media screen and (max-width: 360px) {
            .box {
                padding: 12px 8px 16px;
            }
            h1 {
                font-size: 16px;
            }
            .row label {
                font-size: 13px;
            }
            .row input,
            .row select {
                padding: 8px 8px;
                font-size: 14px;
            }
            .btn-sub {
                font-size: 15px;
                padding: 10px;
            }
            .f2 {
                flex-direction: column;
                gap: 12px;
            }
            .radios {
                gap: 4px;
            }
            .radios label {
                padding: 5px 8px;
                font-size: 12px;
            }
            .f3 {
                gap: 4px;
            }
            .f3 input[type="number"] {
                max-width: 65px !important;
            }
            .btn-gps {
                padding: 0 10px;
                font-size: 12px;
                height: 38px;
            }
        }

        @media screen and (min-width: 361px) and (max-width: 480px) {
            .box {
                padding: 16px 12px 20px;
            }
            .f2 {
                gap: 8px;
            }
        }

        @media screen and (min-width: 768px) {
            body {
                background: linear-gradient(135deg, #e8ecf1 0%, #d5dce6 100%);
                padding: 20px 0;
            }
            .box {
                border-radius: 12px;
                box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
                min-height: auto;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 加载遮罩 -->
    <div class="loading-mask" id="loadingMask">
        <div class="spinner"></div>
        <p>页面加载中...</p>
    </div>

    <div class="box">
        <h1>九江桥工段铁路沿线无人机飞行报备</h1>
        <div class="sub">铁路沿线安全报备 · 请如实填写</div>

        <!-- 成功提示 -->
        <div class="ok-box" id="okBox">
            <div class="big">✅</div>
            <h2>报备提交成功！</h2>
            <p id="okDesc">通知已发送至管理部门</p>
            <div class="note">
                <b>📢 温馨提示：</b><br />
                感谢您的配合！工作人员将在 <b style="color:#e67e22;">24小时内</b> 与您取得联系。<br />
                <b style="color:#c0392b;">在未接到工作人员电话确认前，严禁擅自飞行！</b><br />
                如有疑问：九江桥工段 安设办 ☎️ 0792-7022335
            </div>
            <button onclick="location.reload()">继续报备</button>
        </div>

        <!-- 表单 -->
        <form id="frm" onsubmit="return false;" novalidate>
            <div class="row">
                <label>申请单位 <span class="r">*</span></label>
                <input type="text" id="unit" placeholder="请输入申请单位名称" required />
            </div>

            <div class="row">
                <label>申请人 <span class="r">*</span></label>
                <input type="text" id="name" placeholder="申请人姓名" required />
            </div>

            <div class="row">
                <label>身份证号码 <span class="r">*</span></label>
                <input type="text" id="idcard" placeholder="18位身份证号" required maxlength="18" />
            </div>

            <div class="f2">
                <div class="row">
                    <label>联系电话 <span class="r">*</span></label>
                    <input type="tel" id="phone" placeholder="手机号" required maxlength="11" />
                </div>
                <div class="row">
                    <label>无人机品牌 <span class="r">*</span></label>
                    <input type="text" id="brand" placeholder="如：大疆" required />
                </div>
            </div>

            <div class="row">
                <label>无人机型号/编号 <span class="r">*</span></label>
                <input type="text" id="model" placeholder="型号及机身编号" required />
            </div>

            <!-- 新增：无人机SM码 -->
            <div class="row">
                <label>无人机SM码 <span class="r">*</span></label>
                <input type="text" id="smCode" placeholder="例：SM-2024-0001" required />
            </div>

            <!-- 新增：UOM账号 -->
            <div class="row">
                <label>UOM账号 <span class="r">*</span></label>
                <input type="text" id="uomAccount" placeholder="例：uom.jjqgd@example.com" required />
            </div>

            <div class="row">
                <label>飞行区域铁路线路 <span class="r">*</span></label>
                <select id="area" required>
                    <option value="">-- 请选择 --</option>
                    <option>衢九线</option>
                    <option>铜九线</option>
                    <option>湖口疏解线</option>
                    <option>京九线</option>
                    <option>昌九城际</option>
                    <option>京港高铁</option>
                    <option>武九线</option>
                    <option>武九客专</option>
                    <option>西到线</option>
                    <option>发西线</option>
                    <option>沙浔线</option>
                    <option>九江上行疏解线</option>
                    <option>武九西南联络线</option>
                    <option>武九客专九江联络线</option>
                </select>
            </div>

            <div class="row">
                <label>地点/里程/支柱编号（选填）</label>
                <input type="text" id="location" placeholder="例：京九线 K1313+200" />
            </div>

            <div class="row">
                <label>飞行行政区域（附近村庄） <span class="r">*</span></label>
                <div class="f3">
                    <input type="text" id="addr" placeholder="点击右侧定位，或手动输入地址" required />
                    <button type="button" class="btn-gps" id="btnGps">
                        <span class="icon">📍</span> GPS
                    </button>
                </div>
                <div class="tip" id="tip"></div>
            </div>

            <div class="row">
                <label>飞行用途 <span class="r">*</span></label>
                <div class="radios" id="purposeGroup">
                    <label><input type="radio" name="purpose" value="农业打药" />农业打药</label>
                    <label><input type="radio" name="purpose" value="航拍" />航拍</label>
                    <label><input type="radio" name="purpose" value="勘察测量" />勘察测量</label>
                    <label><input type="radio" name="purpose" value="应急救援" />应急救援</label>
                    <label><input type="radio" name="purpose" value="其他" />其他</label>
                </div>
                <div class="other-box" id="otherBox">
                    <input type="text" id="otherText" placeholder="请备注具体用途" />
                </div>
            </div>

            <div class="row">
                <label>作业起止时间 <span class="r">*</span></label>
                <div class="f3">
                    <input type="datetime-local" id="timeStart" required />
                    <span>至</span>
                    <input type="datetime-local" id="timeEnd" required />
                </div>
            </div>

            <div class="row">
                <label>飞行高度区间（米） <span class="r">*</span></label>
                <div class="f3">
                    <input type="number" id="hMin" placeholder="最低" min="0" required style="max-width:85px;" />
                    <span>~</span>
                    <input type="number" id="hMax" placeholder="最高" min="0" required style="max-width:85px;" />
                    <span>米</span>
                </div>
            </div>

            <div class="row">
                <label>距离铁路距离区间（米） <span class="r">*</span></label>
                <div class="f3">
                    <input type="number" id="dMin" placeholder="最近" min="0" required style="max-width:85px;" />
                    <span>~</span>
                    <input type="number" id="dMax" placeholder="最远" min="0" required style="max-width:85px;" />
                    <span>米</span>
                </div>
            </div>

            <div class="row">
                <label>操作证件编码 <span class="r">*</span></label>
                <input type="text" id="cert" placeholder="如：CAAC-2024-001" required />
            </div>

            <div class="row">
                <label>操作人员资质拍照（选填）</label>
                <div class="upbox" id="upbox">
                    <input type="file" id="file" accept="image/*" capture="environment" />
                    <span>📸 拍照/选择图片</span>
                    <div class="file-info" id="fileInfo">未选择文件</div>
                </div>
            </div>

            <div class="warn">
                <b>⚠️ 依法飞行，安全第一</b><br />
                铁路沿线无人机 <b>黑飞属于违法行为</b>，请确保数据<b>真实完整</b>。
            </div>

            <button type="submit" class="btn-sub" id="btnS">提交报备</button>
        </form>

        <div class="foot">中国铁路南昌路集团公司九江桥工段</div>
    </div>

    <script>
        (function() {
            'use strict';

            // DOM 引用
            const frm = document.getElementById('frm');
            const btnS = document.getElementById('btnS');
            const okBox = document.getElementById('okBox');
            const loadingMask = document.getElementById('loadingMask');

            // 字段
            const unit = document.getElementById('unit');
            const name = document.getElementById('name');
            const idcard = document.getElementById('idcard');
            const phone = document.getElementById('phone');
            const brand = document.getElementById('brand');
            const model = document.getElementById('model');
            const smCode = document.getElementById('smCode');       // 新增SM码
            const uomAccount = document.getElementById('uomAccount'); // 新增UOM账号
            const area = document.getElementById('area');
            const location = document.getElementById('location');
            const addr = document.getElementById('addr');
            const tip = document.getElementById('tip');
            const timeStart = document.getElementById('timeStart');
            const timeEnd = document.getElementById('timeEnd');
            const hMin = document.getElementById('hMin');
            const hMax = document.getElementById('hMax');
            const dMin = document.getElementById('dMin');
            const dMax = document.getElementById('dMax');
            const cert = document.getElementById('cert');
            const file = document.getElementById('file');
            const fileInfo = document.getElementById('fileInfo');
            const purposeRadios = document.querySelectorAll('input[name="purpose"]');
            const otherBox = document.getElementById('otherBox');
            const otherText = document.getElementById('otherText');
            const btnGps = document.getElementById('btnGps');

            // ---- 辅助 ----
            function showMsg(text, isErr) {
                let m = document.getElementById('msg');
                if (!m) {
                    m = document.createElement('div');
                    m.id = 'msg';
                    m.className = 'msg';
                    frm.parentNode.insertBefore(m, frm.nextSibling);
                }
                m.textContent = text;
                m.className = 'msg show' + (isErr ? ' err' : '');
                setTimeout(() => { m.className = 'msg'; }, 4000);
            }

            function hideMsg() {
                const m = document.getElementById('msg');
                if (m) m.className = 'msg';
            }

            // 文件上传显示
            file.addEventListener('change', function() {
                if (this.files && this.files.length > 0) {
                    fileInfo.textContent = this.files[0].name + ' (' + (this.files[0].size / 1024).toFixed(1) + ' KB)';
                } else {
                    fileInfo.textContent = '未选择文件';
                }
            });

            // 点击上传区域触发文件选择
            document.getElementById('upbox').addEventListener('click', function(e) {
                if (e.target.tagName !== 'INPUT') {
                    file.click();
                }
            });

            // 用途单选切换 “其他”
            purposeRadios.forEach(r => {
                r.addEventListener('change', function() {
                    const parentLabel = this.closest('label');
                    document.querySelectorAll('.radios label').forEach(l => l.classList.remove('active'));
                    if (parentLabel) parentLabel.classList.add('active');
                    if (this.value === '其他') {
                        otherBox.classList.add('show');
                        otherText.setAttribute('required', 'required');
                    } else {
                        otherBox.classList.remove('show');
                        otherText.removeAttribute('required');
                    }
                });
            });
            // 默认选中第一个
            const firstRadio = document.querySelector('input[name="purpose"]');
            if (firstRadio) {
                firstRadio.checked = true;
                firstRadio.closest('label').classList.add('active');
            }

            // ---- GPS定位 ----
            btnGps.addEventListener('click', function() {
                if (!navigator.geolocation) {
                    tip.textContent = '⚠️ 浏览器不支持定位，请手动输入地址。';
                    tip.className = 'tip show';
                    return;
                }
                btnGps.disabled = true;
                btnGps.textContent = '定位中...';
                tip.textContent = '⏳ 正在获取位置...';
                tip.className = 'tip show';
                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        const { latitude, longitude } = pos.coords;
                        const url = `https://api.map.baidu.com/reverse_geocoding/v3/?ak=默认密钥&output=json&coordtype=wgs84ll&location=${latitude},${longitude}`;
                        // 为了演示，使用高德地图跨域代理（仅演示，实际生产需后端代理或使用百度/高德SDK）
                        // 使用高德地图API（需key）这里用模拟结果，因为浏览器限制
                        // 实际生产请替换为真实key或后端代理
                        // 这里为了演示，使用模拟地址，同时展示真实坐标
                        const fakeAddr = `江西省九江市濂溪区（约${latitude.toFixed(4)}, ${longitude.toFixed(4)}）`;
                        addr.value = fakeAddr;
                        tip.textContent = `✅ 定位成功 (${latitude.toFixed(5)}, ${longitude.toFixed(5)})，请核对地址。`;
                        tip.className = 'tip show';
                        btnGps.disabled = false;
                        btnGps.innerHTML = '<span class="icon">📍</span> GPS';
                    },
                    function(err) {
                        tip.textContent = '⚠️ 定位失败: ' + err.message + '，请手动输入地址。';
                        tip.className = 'tip show';
                        btnGps.disabled = false;
                        btnGps.innerHTML = '<span class="icon">📍</span> GPS';
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
                );
            });

            // ---- 表单验证与提交 ----
            frm.addEventListener('submit', function(e) {
                e.preventDefault();
                hideMsg();

                // 基本非空验证 (新增SM码和UOM账号)
                const requiredFields = [
                    { el: unit, name: '申请单位' },
                    { el: name, name: '申请人' },
                    { el: idcard, name: '身份证号' },
                    { el: phone, name: '联系电话' },
                    { el: brand, name: '无人机品牌' },
                    { el: model, name: '无人机型号/编号' },
                    { el: smCode, name: '无人机SM码' },
                    { el: uomAccount, name: 'UOM账号' },
                    { el: area, name: '飞行区域铁路线路' },
                    { el: addr, name: '飞行行政区域' },
                    { el: timeStart, name: '作业开始时间' },
                    { el: timeEnd, name: '作业结束时间' },
                    { el: hMin, name: '飞行高度最低' },
                    { el: hMax, name: '飞行高度最高' },
                    { el: dMin, name: '距离铁路最近距离' },
                    { el: dMax, name: '距离铁路最远距离' },
                    { el: cert, name: '操作证件编码' }
                ];

                for (let f of requiredFields) {
                    if (!f.el.value.trim()) {
                        showMsg('请填写: ' + f.name, true);
                        f.el.focus();
                        return;
                    }
                }

                // 检查用途
                let purposeVal = '';
                for (let r of purposeRadios) {
                    if (r.checked) {
                        purposeVal = r.value;
                        break;
                    }
                }
                if (!purposeVal) {
                    showMsg('请选择飞行用途', true);
                    return;
                }
                if (purposeVal === '其他' && !otherText.value.trim()) {
                    showMsg('请备注具体用途', true);
                    otherText.focus();
                    return;
                }

                // 身份证简单校验
                const idReg = /^[1-9]\d{5}(18|19|20)?\d{2}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])\d{3}[\dXx]$/;
                if (!idReg.test(idcard.value.trim())) {
                    showMsg('身份证号码格式不正确，请检查', true);
                    idcard.focus();
                    return;
                }

                // 手机号简单校验
                if (!/^1[3-9]\d{9}$/.test(phone.value.trim())) {
                    showMsg('手机号格式不正确，请检查', true);
                    phone.focus();
                    return;
                }

                // 时间逻辑
                const start = new Date(timeStart.value);
                const end = new Date(timeEnd.value);
                if (isNaN(start.getTime()) || isNaN(end.getTime())) {
                    showMsg('请正确选择作业起止时间', true);
                    return;
                }
                if (end <= start) {
                    showMsg('结束时间必须晚于开始时间', true);
                    timeEnd.focus();
                    return;
                }

                // 高度/距离逻辑
                const hmin = parseFloat(hMin.value);
                const hmax = parseFloat(hMax.value);
                if (isNaN(hmin) || isNaN(hmax) || hmin < 0 || hmax < 0 || hmin > hmax) {
                    showMsg('飞行高度区间请正确填写（最低≤最高，且≥0）', true);
                    return;
                }

                const dmin = parseFloat(dMin.value);
                const dmax = parseFloat(dMax.value);
                if (isNaN(dmin) || isNaN(dmax) || dmin < 0 || dmax < 0 || dmin > dmax) {
                    showMsg('距离铁路区间请正确填写（最近≤最远，且≥0）', true);
                    return;
                }

                // 组装数据（模拟提交）
                const data = {
                    unit: unit.value.trim(),
                    name: name.value.trim(),
                    idcard: idcard.value.trim(),
                    phone: phone.value.trim(),
                    brand: brand.value.trim(),
                    model: model.value.trim(),
                    smCode: smCode.value.trim(),
                    uomAccount: uomAccount.value.trim(),
                    area: area.value,
                    location: location.value.trim(),
                    addr: addr.value.trim(),
                    purpose: purposeVal === '其他' ? otherText.value.trim() : purposeVal,
                    timeStart: timeStart.value,
                    timeEnd: timeEnd.value,
                    hMin: hmin,
                    hMax: hmax,
                    dMin: dmin,
                    dMax: dmax,
                    cert: cert.value.trim(),
                    file: file.files.length > 0 ? file.files[0].name : '未上传'
                };

                // 模拟提交loading
                btnS.disabled = true;
                btnS.textContent = '提交中...';
                loadingMask.classList.add('show');

                // 模拟异步请求
                setTimeout(() => {
                    loadingMask.classList.remove('show');
                    btnS.disabled = false;
                    btnS.textContent = '提交报备';

                    // 成功展示
                    okBox.classList.add('show');
                    frm.style.display = 'none';
                    // 滚动到成功提示
                    okBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    // 记录成功信息
                    document.getElementById('okDesc').textContent = `✅ 报备人：${data.name}，单位：${data.unit}`;
                }, 1200);
            });

            // 隐藏加载遮罩
            window.addEventListener('load', function() {
                loadingMask.classList.remove('show');
            });

            // 如果页面加载慢，最多3秒后隐藏遮罩
            setTimeout(() => {
                loadingMask.classList.remove('show');
            }, 3000);

        })();
    </script>
</body>
</html>
