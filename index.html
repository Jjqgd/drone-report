<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>九江桥工段 · 无人机报备</title>
    <style>
        /* 基础重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", Arial, sans-serif;
            background: #eef2f7;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 主容器 */
        .box {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            background: #ffffff;
            padding: 16px 12px 20px;
            min-height: 100vh;
        }

        /* 标题 */
        h1 {
            font-size: 18px;
            color: #c0392b;
            text-align: center;
            margin: 0 0 8px 0;
            padding: 0 4px;
            line-height: 1.4;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 4px;
        }

        .sub {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        /* 表单行 */
        .row {
            margin-bottom: 12px;
        }

        .row label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            line-height: 1.4;
        }

        .row label .r {
            color: #c0392b;
            margin-left: 1px;
        }

        .row input,
        .row select {
            width: 100%;
            padding: 10px 10px;
            font-size: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fafcff;
            box-sizing: border-box;
            -webkit-appearance: none;
            appearance: none;
            outline: none;
            transition: border-color 0.2s;
            color: #333;
        }

        .row input:focus,
        .row select:focus {
            border-color: #4facfe;
        }

        .row input::placeholder {
            color: #bbb;
            font-size: 14px;
        }

        .row select {
            height: 42px;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23999' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 18px;
            padding-right: 30px;
        }

        /* 双列布局 */
        .f2 {
            display: flex;
            gap: 8px;
        }

        .f2 .row {
            flex: 1;
            margin-bottom: 0;
            min-width: 0;
        }

        /* 三列布局 */
        .f3 {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .f3 input {
            flex: 1;
            min-width: 0;
        }

        .f3 span {
            font-size: 13px;
            color: #999;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* 定位按钮 */
        .btn-gps {
            height: 42px;
            padding: 0 14px;
            background: #e8f0fe;
            color: #1a73e8;
            border: 1px solid #d2e3fc;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }

        .btn-gps .icon {
            font-size: 16px;
            line-height: 1;
        }

        .btn-gps:active {
            background: #d2e3fc;
            transform: scale(0.96);
        }

        .btn-gps:disabled {
            opacity: 0.6;
            transform: none;
        }

        /* 用途选择 */
        .radios {
            background: #f7faff;
            padding: 10px 8px;
            border-radius: 8px;
            border: 1px solid #e8eff6;
            font-size: 13px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .radios label {
            margin: 0;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            font-weight: normal;
            background: white;
            padding: 6px 10px;
            border-radius: 16px;
            border: 1px solid #ddd;
            font-size: 13px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            transition: all 0.2s;
        }

        .radios label.active {
            background: #e3f2fd;
            border-color: #4facfe;
            color: #1976d2;
        }

        .radios input[type="radio"] {
            width: 16px;
            height: 16px;
            margin-right: 4px;
            accent-color: #4facfe;
            flex-shrink: 0;
        }

        /* 其他用途输入框 */
        .other-box {
            display: none;
            margin-top: 8px;
        }

        .other-box.show {
            display: block;
        }

        .other-box input {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fafcff;
            box-sizing: border-box;
        }

        /* 文件上传 */
        .upbox {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 14px;
            text-align: center;
            background: #f8fbfe;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .upbox:active {
            background: #eef4fb;
        }

        .upbox input[type="file"] {
            display: none;
        }

        .upbox span {
            background: #e6eef7;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 14px;
            color: #333;
            display: inline-block;
        }

        .file-info {
            font-size: 12px;
            color: #9aabb8;
            margin-top: 6px;
            word-break: break-all;
            min-height: 18px;
        }

        /* 警告框 */
        .warn {
            background: #fef6f5;
            border-left: 3px solid #c0392b;
            padding: 8px 10px;
            margin: 12px 0;
            font-size: 12px;
            color: #666;
            border-radius: 4px;
            line-height: 1.6;
        }

        .warn b {
            color: #c0392b;
        }

        /* 提交按钮 */
        .btn-sub {
            display: block;
            width: 100%;
            padding: 12px;
            background: #c0392b;
            color: #fff;
            border: none;
            border-radius: 22px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            -webkit-appearance: none;
            appearance: none;
            outline: none;
        }

        .btn-sub:active {
            background: #a93226;
        }

        .btn-sub:disabled {
            background: #ccc;
            color: #888;
        }

        /* 提示信息 */
        .tip {
            display: none;
            margin-top: 6px;
            padding: 8px 10px;
            background: #f0f8ff;
            border-radius: 6px;
            border-left: 3px solid #4facfe;
            font-size: 12px;
            color: #1a5276;
            line-height: 1.5;
            word-break: break-all;
        }

        .tip.show {
            display: block;
        }

        /* 成功提示 */
        .ok-box {
            display: none;
            text-align: center;
            padding: 20px 14px;
            background: #f0faf5;
            border: 2px solid #2d7a4f;
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .ok-box.show {
            display: block;
        }

        .ok-box .big {
            font-size: 40px;
            margin-bottom: 6px;
        }

        .ok-box h2 {
            font-size: 18px;
            color: #2d7a4f;
            margin: 6px 0;
        }

        .ok-box p {
            font-size: 13px;
            color: #666;
            margin: 4px 0;
            line-height: 1.5;
        }

        .ok-box .note {
            background: #fff8e1;
            border-left: 3px solid #f39c12;
            padding: 10px;
            margin-top: 10px;
            text-align: left;
            font-size: 12px;
            color: #666;
            line-height: 1.7;
            border-radius: 4px;
        }

        .ok-box button {
            margin-top: 10px;
            padding: 8px 20px;
            background: #c0392b;
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        /* 全局消息 */
        .msg {
            display: none;
            background: #1d3b2f;
            color: #fff;
            padding: 10px 14px;
            border-radius: 20px;
            text-align: center;
            margin-top: 10px;
            font-size: 13px;
            line-height: 1.5;
        }

        .msg.show {
            display: block;
        }

        .msg.err {
            background: #8b2c2c;
        }

        /* 底部 */
        .foot {
            text-align: center;
            font-size: 13px;
            color: #c0392b;
            margin-top: 14px;
            padding-top: 10px;
            border-top: 1px solid #eee;
            font-weight: bold;
        }

        /* 加载状态 */
        .loading-mask {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 12px;
        }
        .loading-mask.show {
            display: flex;
        }
        .loading-mask .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #c0392b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-mask p {
            color: #555;
            font-size: 14px;
        }

        /* 小屏手机适配 */
        @media screen and (max-width: 360px) {
            .box {
                padding: 12px 8px 16px;
            }
            h1 {
                font-size: 16px;
            }
            .row label {
                font-size: 13px;
            }
            .row input,
            .row select {
                padding: 8px 8px;
                font-size: 14px;
            }
            .btn-sub {
                font-size: 15px;
                padding: 10px;
            }
            .f2 {
                flex-direction: column;
                gap: 12px;
            }
            .radios {
                gap: 4px;
            }
            .radios label {
                padding: 5px 8px;
                font-size: 12px;
            }
            .f3 {
                gap: 4px;
            }
            .f3 input[type="number"] {
                max-width: 65px !important;
            }
            .btn-gps {
                padding: 0 10px;
                font-size: 12px;
                height: 38px;
            }
        }

        @media screen and (min-width: 361px) and (max-width: 480px) {
            .box {
                padding: 16px 12px 20px;
            }
            .f2 {
                gap: 8px;
            }
        }

        @media screen and (min-width: 768px) {
            body {
                background: linear-gradient(135deg, #e8ecf1 0%, #d5dce6 100%);
                padding: 20px 0;
            }
            .box {
                border-radius: 12px;
                box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
                min-height: auto;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 加载遮罩 -->
    <div class="loading-mask" id="loadingMask">
        <div class="spinner"></div>
        <p>页面加载中...</p>
    </div>

    <div class="box">
        <h1>九江桥工段铁路沿线无人机飞行报备</h1>
        <div class="sub">铁路沿线安全报备 · 请如实填写</div>

        <!-- 成功提示 -->
        <div class="ok-box" id="okBox">
            <div class="big">✅</div>
            <h2>报备提交成功！</h2>
            <p id="okDesc">通知已发送至管理部门</p>
            <div class="note">
                <b>📢 温馨提示：</b><br />
                感谢您的配合！工作人员将在 <b style="color:#e67e22;">24小时内</b> 与您取得联系。<br />
                <b style="color:#c0392b;">在未接到工作人员电话确认前，严禁擅自飞行！</b><br />
                如有疑问：九江桥工段 安设办 ☎️ 0792-7022335
            </div>
            <button onclick="location.reload()">继续报备</button>
        </div>

        <!-- 表单 -->
        <form id="frm" onsubmit="return false;" novalidate>
            <div class="row">
                <label>申请单位 <span class="r">*</span></label>
                <input type="text" id="unit" placeholder="请输入申请单位名称" required />
            </div>

            <div class="row">
                <label>申请人 <span class="r">*</span></label>
                <input type="text" id="name" placeholder="申请人姓名" required />
            </div>

            <div class="row">
                <label>身份证号码 <span class="r">*</span></label>
                <input type="text" id="idcard" placeholder="18位身份证号" required maxlength="18" />
            </div>

            <div class="f2">
                <div class="row">
                    <label>联系电话 <span class="r">*</span></label>
                    <input type="tel" id="phone" placeholder="手机号" required maxlength="11" />
                </div>
                <div class="row">
                    <label>无人机品牌 <span class="r">*</span></label>
                    <input type="text" id="brand" placeholder="如：大疆" required />
                </div>
            </div>

            <div class="row">
                <label>无人机型号/编号 <span class="r">*</span></label>
                <input type="text" id="model" placeholder="型号及机身编号" required />
            </div>

            <div class="row">
                <label>飞行区域铁路线路 <span class="r">*</span></label>
                <select id="area" required>
                    <option value="">-- 请选择 --</option>
                    <option>衢九线</option>
                    <option>铜九线</option>
                    <option>湖口疏解线</option>
                    <option>京九线</option>
                    <option>昌九城际</option>
                    <option>京港高铁</option>
                    <option>武九线</option>
                    <option>武九客专</option>
                    <option>西到线</option>
                    <option>发西线</option>
                    <option>沙浔线</option>
                    <option>九江上行疏解线</option>
                    <option>武九西南联络线</option>
                    <option>武九客专九江联络线</option>
                </select>
            </div>

            <div class="row">
                <label>地点/里程/支柱编号（选填）</label>
                <input type="text" id="location" placeholder="例：京九线 K1313+200" />
            </div>

            <div class="row">
                <label>飞行行政区域（附近村庄） <span class="r">*</span></label>
                <div class="f3">
                    <input type="text" id="addr" placeholder="点击右侧定位，或手动输入地址" required />
                    <button type="button" class="btn-gps" id="btnGps">
                        <span class="icon">📍</span> GPS
                    </button>
                </div>
                <div class="tip" id="tip"></div>
            </div>

            <div class="row">
                <label>飞行用途 <span class="r">*</span></label>
                <div class="radios" id="purposeGroup">
                    <label><input type="radio" name="purpose" value="农业打药" />农业打药</label>
                    <label><input type="radio" name="purpose" value="航拍" />航拍</label>
                    <label><input type="radio" name="purpose" value="勘察测量" />勘察测量</label>
                    <label><input type="radio" name="purpose" value="应急救援" />应急救援</label>
                    <label><input type="radio" name="purpose" value="其他" />其他</label>
                </div>
                <div class="other-box" id="otherBox">
                    <input type="text" id="otherText" placeholder="请备注具体用途" />
                </div>
            </div>

            <div class="row">
                <label>作业起止时间 <span class="r">*</span></label>
                <div class="f3">
                    <input type="datetime-local" id="timeStart" required />
                    <span>至</span>
                    <input type="datetime-local" id="timeEnd" required />
                </div>
            </div>

            <div class="row">
                <label>飞行高度区间（米） <span class="r">*</span></label>
                <div class="f3">
                    <input type="number" id="hMin" placeholder="最低" min="0" required style="max-width:85px;" />
                    <span>~</span>
                    <input type="number" id="hMax" placeholder="最高" min="0" required style="max-width:85px;" />
                    <span>米</span>
                </div>
            </div>

            <div class="row">
                <label>距离铁路距离区间（米） <span class="r">*</span></label>
                <div class="f3">
                    <input type="number" id="dMin" placeholder="最近" min="0" required style="max-width:85px;" />
                    <span>~</span>
                    <input type="number" id="dMax" placeholder="最远" min="0" required style="max-width:85px;" />
                    <span>米</span>
                </div>
            </div>

            <div class="row">
                <label>操作证件编码 <span class="r">*</span></label>
                <input type="text" id="cert" placeholder="如：CAAC-2024-001" required />
            </div>

            <div class="row">
                <label>操作人员资质拍照（选填）</label>
                <div class="upbox" id="upbox">
                    <input type="file" id="file" accept="image/*" capture="environment" />
                    <span>📸 拍照/选择图片</span>
                    <div class="file-info" id="fileInfo">未选择文件</div>
                </div>
            </div>

            <div class="warn">
                <b>⚠️ 依法飞行，安全第一</b><br />
                铁路沿线无人机 <b>黑飞属于违法行为</b>，请确保数据<b>真实完整</b>。
            </div>

            <button type="submit" class="btn-sub" id="btnSub">📨 提交报备</button>
        </form>

        <div class="msg" id="msg"></div>
        <div class="foot">中国铁路南昌局集团公司九江桥工段</div>
    </div>

    <script>
        (function() {
            'use strict';

            // 立即隐藏加载遮罩（页面内容已就绪）
            var loadingMask = document.getElementById('loadingMask');
            if (loadingMask) loadingMask.classList.remove('show');

            // ========== 配置 ==========
            var WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=b2ccb8e7bba75a6a234ac8343488dcd66b39da2dc23ae4307a2e0e2b567f13e5';
            var PPCODE = '20260713';
            var PROXY = 'https://dingtalk-proxy.netlify.app/.netlify/functions';
            var AMAPKEY = '944cb277c68d71409d48d100bb305244';

            // ========== DOM 元素 ==========
            var btnSub = document.getElementById('btnSub');
            var btnGps = document.getElementById('btnGps');
            var tip = document.getElementById('tip');

            var msg = document.getElementById('msg');

            var okDesc = document.getElementById('okDesc');
            var otherBox = document.getElementById('otherBox');
            var otherText = document.getElementById('otherText');
            var fileInfo = document.getElementById('fileInfo');
            var frm = document.getElementById('frm');

            var loc = { lat: null, lng: null };
            var locking = false;
            var submitting = false;
            var toastTimer = null;

            // ========== 工具函数 ==========
            function show(el) {
                if (el) el.classList.add('show');
            }

            function hide(el) {
                if (el) el.classList.remove('show');
            }

            function toast(txt, isError) {
                if (toastTimer) clearTimeout(toastTimer);
                msg.textContent = txt;
                msg.className = 'msg show' + (isError ? ' err' : '');
                toastTimer = setTimeout(function() {
                    msg.className = 'msg';
                }, 4000);
            }

            // ========== 获取设备信息 ==========
            function getDeviceInfo() {
                var ua = navigator.userAgent || '';
                var os = '未知';
                var platform = '未知';

                if (/iPhone|iPad|iPod/i.test(ua)) {
                    os = 'iOS';
                } else if (/Android/i.test(ua)) {
                    os = 'Android';
                } else if (/HarmonyOS|鸿蒙/i.test(ua) || /OpenHarmony/i.test(ua)) {
                    os = 'HarmonyOS (鸿蒙)';
                } else if (/Windows/i.test(ua)) {
                    os = 'Windows';
                } else if (/Mac/i.test(ua)) {
                    os = 'macOS';
                } else if (/Linux/i.test(ua)) {
                    os = 'Linux';
                }

                if (/MicroMessenger/i.test(ua)) {
                    platform = '微信';
                } else if (/DingTalk/i.test(ua)) {
                    platform = '钉钉';
                } else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) {
                    platform = 'Safari浏览器';
                } else if (/Chrome/i.test(ua)) {
                    platform = 'Chrome浏览器';
                } else if (/Firefox/i.test(ua)) {
                    platform = 'Firefox浏览器';
                } else if (/Edge/i.test(ua)) {
                    platform = 'Edge浏览器';
                } else if (/UCBrowser/i.test(ua)) {
                    platform = 'UC浏览器';
                } else if (/QQBrowser/i.test(ua)) {
                    platform = 'QQ浏览器';
                } else if (/MQQBrowser/i.test(ua)) {
                    platform = 'QQ浏览器';
                } else if (/baiduboxapp/i.test(ua)) {
                    platform = '百度浏览器';
                } else {
                    platform = '浏览器';
                }

                return os + ' · ' + platform;
            }

            // ========== 用途单选处理 ==========
            var purposeRadios = document.getElementsByName('purpose');
            var purposeLabels = document.querySelectorAll('#purposeGroup label');

            function updateRadioStyles() {
                purposeLabels.forEach(function(label) {
                    var radio = label.querySelector('input[type="radio"]');
                    if (radio && radio.checked) {
                        label.classList.add('active');
                    } else {
                        label.classList.remove('active');
                    }
                });
            }

            for (var i = 0; i < purposeRadios.length; i++) {
                purposeRadios[i].addEventListener('change', function() {
                    updateRadioStyles();
                    if (this.value === '其他') {
                        show(otherBox);
                        setTimeout(function() {
                            if (otherText) otherText.focus();
                        }, 150);
                    } else {
                        hide(otherBox);
                        if (otherText) otherText.value = '';
                    }
                });
            }

            purposeLabels.forEach(function(label) {
                label.addEventListener('click', function(e) {
                    var radio = this.querySelector('input[type="radio"]');
                    if (radio && !radio.checked) {
                        radio.checked = true;
                        var event;
                        if (typeof Event === 'function') {
                            event = new Event('change', { bubbles: true });
                        } else {
                            event = document.createEvent('Event');
                            event.initEvent('change', true, true);
                        }
                        radio.dispatchEvent(event);
                    }
                });
            });

            updateRadioStyles();

            // ========== 默认时间 ==========
            function setDefaultTimes() {
                var now = new Date();
                var tomorrow = new Date(now);
                tomorrow.setDate(tomorrow.getDate() + 1);
                tomorrow.setHours(8, 0, 0, 0);

                var endTime = new Date(tomorrow);
                endTime.setHours(17, 0, 0, 0);

                function formatDT(d) {
                    var y = d.getFullYear();
                    var m = String(d.getMonth() + 1).padStart(2, '0');
                    var day = String(d.getDate()).padStart(2, '0');
                    var h = String(d.getHours()).padStart(2, '0');
                    var min = String(d.getMinutes()).padStart(2, '0');
                    return y + '-' + m + '-' + day + 'T' + h + ':' + min;
                }

                var ts = document.getElementById('timeStart');
                var te = document.getElementById('timeEnd');
                if (ts && !ts.value) ts.value = formatDT(tomorrow);
                if (te && !te.value) te.value = formatDT(endTime);
            }

            setDefaultTimes();

            // ========== 输入限制 ==========
            var idcardEl = document.getElementById('idcard');
            if (idcardEl) {
                idcardEl.addEventListener('input', function() {
                    this.value = this.value.replace(/[^\dXx]/g, '').toUpperCase();
                    if (this.value.length > 18) this.value = this.value.slice(0, 18);
                });
            }

            var phoneEl = document.getElementById('phone');
            if (phoneEl) {
                phoneEl.addEventListener('input', function() {
                    this.value = this.value.replace(/[^\d]/g, '');
                    if (this.value.length > 11) this.value = this.value.slice(0, 11);
                });
            }

            // ========== GPS定位 ==========
            function resetGps() {
                locking = false;
                if (btnGps) {
                    btnGps.disabled = false;
                }
            }

            if (btnGps) {
                btnGps.addEventListener('click', function() {
                    if (locking || submitting) return;

                    if (!navigator.geolocation) {
                        toast('浏览器不支持GPS，请手动输入地址', true);
                        return;
                    }

                    locking = true;
                    btnGps.disabled = true;
                    show(tip);
                    tip.textContent = '正在获取GPS位置...';

                    navigator.geolocation.getCurrentPosition(
                        function(pos) {
                            loc.lat = pos.coords.latitude;
                            loc.lng = pos.coords.longitude;
                            tip.textContent = 'GPS成功！正在解析地址...';
                            getAddress(loc.lat, loc.lng);
                        },
                        function(err) {
                            resetGps();
                            var errMsg = 'GPS定位失败';
                            switch (err.code) {
                                case 1:
                                    errMsg = '请允许浏览器定位权限';
                                    break;
                                case 2:
                                    errMsg = '请开启设备GPS定位';
                                    break;
                                case 3:
                                    errMsg = '定位超时，请重试';
                                    break;
                            }
                            tip.textContent = errMsg + '，请手动输入地址';
                            show(tip);
                            toast(errMsg, true);
                        }, {
                            enableHighAccuracy: true,
                            timeout: 15000,
                            maximumAge: 60000
                        }
                    );
                });
            }

            function getAddress(lat, lng) {
                var xhr = new XMLHttpRequest();
                var url = 'https://restapi.amap.com/v3/geocode/regeo?key=' + AMAPKEY +
                    '&location=' + lng + ',' + lat + '&output=JSON&radius=1000&extensions=all';

                xhr.open('GET', url, true);
                xhr.timeout = 10000;

                xhr.onreadystatechange = function() {
                    if (xhr.readyState !== 4) return;
                    resetGps();

                    if (xhr.status === 200) {
                        try {
                            var data = JSON.parse(xhr.responseText);
                            if (data && data.status === '1' && data.regeocode) {
                                var address = buildAddress(data.regeocode);
                                if (address) {
                                    if (addr) addr.value = address;
                                    tip.innerHTML = '✅ 定位成功！<br><b>' + address + '</b>';
                                    show(tip);
                                    toast('定位成功');
                                    setTimeout(function() {
                                        if (tip.textContent.indexOf(address) !== -1) {
                                            hide(tip);
                                        }
                                    }, 6000);
                                } else {
                                    tip.textContent = '无法解析地址，请手动输入';
                                    show(tip);
                                    toast('请手动输入地址', true);
                                }
                            } else {
                                tip.textContent = '地址解析失败，请手动输入';
                                show(tip);
                                toast('请手动输入地址', true);
                            }
                        } catch (e) {
                            tip.textContent = '解析异常，请手动输入';
                            show(tip);
                            toast('请手动输入地址', true);
                        }
                    } else {
                        tip.textContent = '网络异常，请手动输入';
                        show(tip);
                        toast('请手动输入地址', true);
                    }
                };

                xhr.onerror = function() {
                    resetGps();
                    tip.textContent = '网络异常，请手动输入';
                    show(tip);
                    toast('网络异常', true);
                };

                xhr.ontimeout = function() {
                    resetGps();
                    tip.textContent = '请求超时，请手动输入';
                    show(tip);
                    toast('请求超时', true);
                };

                xhr.send();
            }

            function buildAddress(regeocode) {
                var parts = [];
                var ac = regeocode.addressComponent;

                if (ac) {
                    if (ac.province && ac.province !== '[]') parts.push(ac.province);
                    if (ac.city && ac.city !== '[]' && ac.city !== ac.province) parts.push(ac.city);
                    if (ac.district && ac.district !== '[]') parts.push(ac.district);
                    if (ac.township && ac.township !== '[]') parts.push(ac.township);
                    if (ac.streetNumber && ac.streetNumber.street && ac.streetNumber.street !== '[]') {
                        var s = ac.streetNumber.street;
                        if (ac.streetNumber.number && ac.streetNumber.number !== '[]') {
                            s += ac.streetNumber.number + '号';
                        }
                        parts.push(s);
                    }
                }

                var pois = regeocode.pois || [];
                if (pois.length > 0 && pois[0].name && pois[0].name !== '[]') {
                    parts.push('(' + pois[0].name + '附近)');
                }

                var result = parts.join('');
                if (!result) result = regeocode.formatted_address || '';
                return result;
            }

            // ========== 文件上传 ==========
            var fileInput = document.getElementById('file');
            var upbox = document.getElementById('upbox');

            if (fileInput) {
                fileInput.addEventListener('change', function() {
                    if (this.files && this.files.length > 0) {
                        var f = this.files[0];
                        var sizeKB = (f.size / 1024).toFixed(1);
                        var sizeDisplay = sizeKB > 1024 ?
                            (f.size / 1048576).toFixed(1) + ' MB' :
                            sizeKB + ' KB';
                        if (fileInfo) {
                            fileInfo.textContent = '已选: ' + f.name + ' (' + sizeDisplay + ')';
                            fileInfo.style.color = '#1a6e3a';
                        }
                    } else {
                        if (fileInfo) {
                            fileInfo.textContent = '未选择文件';
                            fileInfo.style.color = '#9aabb8';
                        }
                    }
                });
            }

            if (upbox) {
                upbox.addEventListener('click', function(e) {
                    if (e.target.tagName !== 'INPUT' && fileInput) {
                        fileInput.click();
                    }
                });
            }

            // ========== 日期格式化 ==========
            function formatDate(isoStr) {
                if (!isoStr) return '未填写';
                try {
                    var d = new Date(isoStr);
                    if (isNaN(d.getTime())) return isoStr;
                    return d.getFullYear() + '年' +
                        String(d.getMonth() + 1).padStart(2, '0') + '月' +
                        String(d.getDate()).padStart(2, '0') + '日 ' +
                        String(d.getHours()).padStart(2, '0') + ':' +
                        String(d.getMinutes()).padStart(2, '0');
                } catch (e) {
                    return isoStr;
                }
            }

            // ========== 消息推送（带重试和降级） ==========
            function sendDingtalk(content, callback, retry) {
                retry = retry || 0;
                var url = PROXY + '/dingtalk?webhook=' + encodeURIComponent(WEBHOOK);
                var body = JSON.stringify({
                    msgtype: 'text',
                    text: { content: content }
                });

                try {
                    fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: body
                        })
                        .then(function(res) { return res.json(); })
                        .then(function(data) {
                            callback(data && data.errcode === 0);
                        })
                        .catch(function() {
                            if (retry < 2) {
                                setTimeout(function() {
                                    sendDingtalk(content, callback, retry + 1);
                                }, 1000);
                            } else {
                                callback(false);
                            }
                        });
                } catch (e) {
                    if (retry < 2) {
                        setTimeout(function() {
                            sendDingtalk(content, callback, retry + 1);
                        }, 1000);
                    } else {
                        callback(false);
                    }
                }
            }

            function sendWechat(title, content, callback, retry) {
                retry = retry || 0;
                if (!PPCODE) {
                    callback(true);
                    return;
                }
                var url = PROXY + '/pushplus';
                var body = JSON.stringify({
                    token: PPCODE,
                    title: title,
                    content: content,
                    template: 'html'
                });

                try {
                    fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: body
                        })
                        .then(function(res) { return res.json(); })
                        .then(function(data) {
                            callback(data && data.code === 200);
                        })
                        .catch(function() {
                            if (retry < 2) {
                                setTimeout(function() {
                                    sendWechat(title, content, callback, retry + 1);
                                }, 1000);
                            } else {
                                callback(false);
                            }
                        });
                } catch (e) {
                    if (retry < 2) {
                        setTimeout(function() {
                            sendWechat(title, content, callback, retry + 1);
                        }, 1000);
                    } else {
                        callback(false);
                    }
                }
            }

            // ========== 表单提交 ==========
            if (frm) {
                frm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    if (submitting) return;

                    var unit = (document.getElementById('unit').value || '').trim();
                    var name = (document.getElementById('name').value || '').trim();
                    var idcard = (document.getElementById('idcard').value || '').trim();
                    var phone = (document.getElementById('phone').value || '').trim();
                    var brand = (document.getElementById('brand').value || '').trim();
                    var model = (document.getElementById('model').value || '').trim();
                    var area = document.getElementById('area').value;
                    var location = (document.getElementById('location').value || '').trim();
                    var admin = (document.getElementById('addr').value || '').trim();
                    var purp = document.querySelector('input[name="purpose"]:checked');
                    var other = (document.getElementById('otherText').value || '').trim();
                    var ts = document.getElementById('timeStart').value;
                    var te = document.getElementById('timeEnd').value;
                    var hmin = (document.getElementById('hMin').value || '').trim();
                    var hmax = (document.getElementById('hMax').value || '').trim();
                    var dmin = (document.getElementById('dMin').value || '').trim();
                    var dmax = (document.getElementById('dMax').value || '').trim();
                    var cert = (document.getElementById('cert').value || '').trim();

                    if (!unit || !name || !idcard || !phone || !brand || !model) {
                        toast('请完整填写所有必填项', true);
                        return;
                    }
                    if (idcard.length < 15) {
                        toast('请填写有效身份证号', true);
                        return;
                    }
                    if (!/^\d{11}$/.test(phone)) {
                        toast('请填写11位手机号', true);
                        return;
                    }
                    if (!area) {
                        toast('请选择铁路线路', true);
                        return;
                    }
                    if (!admin) {
                        toast('请填写行政区域或使用GPS定位', true);
                        return;
                    }
                    if (!purp) {
                        toast('请选择飞行用途', true);
                        return;
                    }
                    if (!ts || !te) {
                        toast('请设置作业起止时间', true);
                        return;
                    }

                    var startD = new Date(ts);
                    var endD = new Date(te);
                    if (isNaN(startD.getTime()) || isNaN(endD.getTime())) {
                        toast('请设置有效的时间', true);
                        return;
                    }
                    if (startD >= endD) {
                        toast('结束时间必须晚于开始时间', true);
                        return;
                    }
                    if (!hmin || !hmax) {
                        toast('请填写飞行高度区间', true);
                        return;
                    }
                    if (parseFloat(hmin) > parseFloat(hmax)) {
                        toast('最高高度应大于最低高度', true);
                        return;
                    }
                    if (!dmin || !dmax) {
                        toast('请填写距离铁路区间', true);
                        return;
                    }
                    if (parseFloat(dmin) > parseFloat(dmax)) {
                        toast('最远距离应大于最近距离', true);
                        return;
                    }
                    if (!cert) {
                        toast('请填写操作证件编码', true);
                        return;
                    }

                    var purpose = purp.value;
                    if (purpose === '其他' && other) {
                        purpose += '（' + other + '）';
                    }

                    var nowStr = formatDate(new Date().toISOString());
                    var deviceInfo = getDeviceInfo();

                    var dc = '【无人机飞行报备通知】\n\n' +
                        '📋 申请单位：' + unit + '\n' +
                        '👤 申请人：' + name + '\n' +
                        '🆔 身份证号：' + idcard + '\n' +
                        '📱 联系电话：' + phone + '\n' +
                        '🚁 无人机品牌：' + brand + '\n' +
                        '🔧 型号/编号：' + model + '\n' +
                        '🛤️ 飞行线路：' + area + '\n' +
                        (location ? '📍 地点里程：' + location + '\n' : '') +
                        '🏘️ 行政区域：' + admin + '\n' +
                        '🎯 飞行用途：' + purpose + '\n' +
                        '⏰ 作业时间：' + formatDate(ts) + ' 至 ' + formatDate(te) + '\n' +
                        '📏 飞行高度：' + hmin + 'm ~ ' + hmax + 'm\n' +
                        '📐 距铁路：' + dmin + 'm ~ ' + dmax + 'm\n' +
                        '📝 证件编码：' + cert + '\n' +
                        '\n⏰ 报备时间：' + nowStr + '\n' +
                        '📱 提交设备：' + deviceInfo + '\n' +
                        '⚠️ 请工作人员24小时内核实确认。';

                    var wc = '<h2 style="color:#c0392b;">🚁 无人机飞行报备通知</h2>' +
                        '<table style="width:100%;border-collapse:collapse;font-size:14px;">' +
                        '<tr><td style="padding:6px;border:1px solid #eee;background:#f5f5f5;"><b>📋 单位</b></td><td style="padding:6px;border:1px solid #eee;">' + unit + '</td></tr>' +
                        '<tr><td style="padding:6px;border:1px solid #eee;background:#f5f5f5;"><b>👤 申请人</b></td><td style="padding:6px;border:1px solid #eee;">' + name + '</td></tr>' +
                        '<tr><td style="padding:6px;border:1px solid #eee;background:#f5f5f5;"><b>📱 电话</b></td><td style="padding:6px;border:1px solid #eee;">' + phone + '</td></tr>' +
                        '<tr><td style="padding:6px;border:1px solid #eee;background:#f5f5f5;"><b>🚁 无人机</b></td><td style="padding:6px;border:1px solid #eee;">' + brand + ' - ' + model + '</td></tr>' +
                        '<tr><td style="padding:6px;border:1px solid #eee;background:#f5f5f5;"><b>🛤️ 线路</b></td><td style="padding:6px;border:1px solid #eee;">' + area + '</td></tr>' +
                        (location ? '<tr><td style="padding:6px;border:1px solid #eee;background:#f5f5f5;"><b>📍 地点</b></td><td style="padding:6px;border:1px solid #eee;">' + location + '</td></tr>' : '') +
                        '<tr><td style="padding:6px;border:1px solid #eee;background:#f5f5f5;"><b>🏘️ 区域</b></td><td style="padding:6px;border:1px solid #eee;">' + admin + '</td></tr>' +
                        '<tr><td style="padding:6px;border:1px solid #eee;background:#f5f5f5;"><b>🎯 用途</b></td><td style="padding:6px;border:1px solid #eee;">' + purpose + '</td></tr>' +
                        '<tr><td style="padding:6px;border:1px solid #eee;background:#f5f5f5;"><b>⏰ 时间</b></td><td style="padding:6px;border:1px solid #eee;">' + formatDate(ts) + ' 至 ' + formatDate(te) + '</td></tr>' +
                        '<tr><td style="padding:6px;border:1px solid #eee;background:#f5f5f5;"><b>📏 高度</b></td><td style="padding:6px;border:1px solid #eee;">' + hmin + 'm ~ ' + hmax + 'm</td></tr>' +
                        '<tr><td style="padding:6px;border:1px solid #eee;background:#f5f5f5;"><b>📐 距离</b></td><td style="padding:6px;border:1px solid #eee;">' + dmin + 'm ~ ' + dmax + 'm</td></tr>' +
                        '<tr><td style="padding:6px;border:1px solid #eee;background:#f5f5f5;"><b>📝 证件</b></td><td style="padding:6px;border:1px solid #eee;">' + cert + '</td></tr>' +
                        '</table>' +
                        '<p style="color:#999;font-size:12px;">⏰ 报备时间：' + nowStr + '</p>' +
                        '<p style="color:#666;font-size:12px;">📱 提交设备：' + deviceInfo + '</p>' +
                        '<p style="color:#c0392b;font-weight:bold;">⚠️ 请工作人员24小时内核实确认。</p>';

                    submitting = true;
                    btnSub.disabled = true;
                    btnSub.textContent = '⏳ 正在提交...';
                    toast('正在提交报备信息...');

                    var ddOk = false;
                    var wxOk = false;
                    var done = 0;

                    function checkDone() {
                        done++;
                        if (done >= 2) {
                            submitting = false;
                            btnSub.disabled = false;
                            btnSub.textContent = '📨 提交报备';

                            if (ddOk || wxOk) {
                                frm.style.display = 'none';
                                show(okBox);
                                if (ddOk && wxOk) {
                                    okDesc.textContent = '通知已通过钉钉和微信发送至管理部门';
                                } else if (ddOk) {
                                    okDesc.textContent = '通知已通过钉钉发送至管理部门';
                                } else {
                                    okDesc.textContent = '通知已通过微信发送至管理部门';
                                }
                                window.scrollTo({ top: 0, behavior: 'smooth' });
                            } else {
                                toast('提交失败，请检查网络后重试', true);
                            }
                        }
                    }

                    sendDingtalk(dc, function(ok) { ddOk = ok;
                        checkDone(); });
                    sendWechat('无人机飞行报备 - ' + name, wc, function(ok) { wxOk = ok;
                        checkDone(); });
                });
            }

            // 检测是否在钉钉或微信内置浏览器中，显示兼容提示
            var ua = navigator.userAgent || '';
            if (/DingTalk/i.test(ua) || /MicroMessenger/i.test(ua)) {
                console.log('检测到在钉钉/微信内置浏览器中打开，已启用兼容模式');
                // 给页面增加一个轻微的底部提示（不打扰用户）
                var foot = document.querySelector('.foot');
                if (foot) {
                    var tipCompat = document.createElement('div');
                    tipCompat.style.cssText = 'font-size:11px;color:#aaa;text-align:center;margin-top:6px;';
                    tipCompat.textContent = '💡 如在钉钉中显示异常，请点击右上角「在浏览器中打开」';
                    foot.parentNode.insertBefore(tipCompat, foot.nextSibling);
                }
            }

            console.log('✅ 九江桥工段无人机报备系统已就绪');

        })();
    </script>
</body>
</html>
